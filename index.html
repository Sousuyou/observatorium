<style>
  /*
    香の天文台 — OBSERVATORIUM BOTANICUM
    宇宙とボタニカルが交わる観測室。
    下段の標本札（ジンの主要ボタニカル10種・ラテン学名）に触れると、
    その香りのアンビエント層が灯り、中央の渾天儀に軌道環がひとつ加わる。
    層は重なるほど壮大な和音となり（全層が純正律で必ず調和する設計）、
    映像は触れられない——ただ威風をもって、立体的に回り続ける。
    鈴が鳴る瞬間、その軌道の星が光る（音と映像の同期）。

    省電力契約：fps上限30／無灯時は8fps・WebGL不使用・DPR1.5上限・
    タブ非表示・消音時は AudioContext を停止

    v1.6「星座と銘酒」：
    ・香気の星座 ─ 成分を共有する主星同士が銀の糸で結ばれる（TRACE中は金）
    ・分子の線画 ─ 調書に代表成分の骨格構造式（16種・手書き座標）
    ・深宇宙の残響 ─ 軌道半径が遠い標本ほど長い残響の彼方で鳴る
    ・律（基準星）─ 根音を五つの一等星から選ぶ。点灯中の層はグリッサンド
    ・ARCHIVE ─ 実在銘酒の公知ボタニカル構成（標本箱の外は「欠測」）

    v1.7「和声の天秤」：
    ・擦れの実測 ─ Plomp–Levelt曲線で点灯ペアの粗さを計算し、
      擦れの強い層の上部部分音だけを沈める（基音の色は残す＝攻めは保つ）
    ・潮汐 ─ 各層50〜90秒のうねりで交代に前へ。和音が呼吸する
    ・観測者のピアノ ─ フェルトの鍵盤が配合の音高だけを爪弾く。
      均整なら広い分散和音、攻めた配合は最も擦れる二音を声に出す
    ・HUDに HARMONY（緊張度計）：SERENE/BALANCED/DARING/AUGMENTED

    v1.8「白霧と針音」── 観測室に棲む四つのノイズ：
    ・蒸留の白霧 ─ 核から立つ蒸気のベッド。層の数で濃淡、41秒のフィルタ揺らぎ
    ・宇宙背景の囁き ─ 全消灯でも 2.725K の極小ヒスが「聴いている」気配を残す
    ・彗星の航跡音 ─ 横断の6.5秒、1900→170Hzへ滑降し映像のパンと同期
    ・記録の針音 ─ 観測記録が一行刻まれるたび、ペン先のクラックル
  */
  :root{
    --ink:#e8edf8; --dim:#7d87a6; --hair:rgba(205,216,240,.14);
    --gold:#cdb98c; --mono:"SF Mono","Menlo","Courier New",monospace;
    --serif:"Hiragino Mincho ProN","Yu Mincho",Georgia,serif;
    --sans:"Hiragino Sans","Helvetica Neue",Arial,sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; overflow:hidden; background:#040508; }
  body{ font-family:var(--serif); color:var(--ink); }
  #g{ position:fixed; inset:0; display:block; pointer-events:none; } /* 映像には触れられない */

  /* 観測室の枠：細いヘアラインと四隅の照準 */
  .frame{ position:fixed; inset:11px; border:1px solid var(--hair); pointer-events:none; z-index:2; }
  .frame i{ position:absolute; width:13px; height:13px; pointer-events:none; }
  .frame i::before,.frame i::after{ content:""; position:absolute; background:rgba(205,216,240,.34); }
  .frame i::before{ width:13px; height:1px; top:6px; }
  .frame i::after{ width:1px; height:13px; left:6px; }
  .frame .c1{ left:-7px; top:-7px; } .frame .c2{ right:-7px; top:-7px; }
  .frame .c3{ left:-7px; bottom:-7px; } .frame .c4{ right:-7px; bottom:-7px; }

  .brand{
    position:fixed; left:max(30px, env(safe-area-inset-left));
    top:max(26px, env(safe-area-inset-top)); z-index:3; pointer-events:none;
  }
  .brand h1{
    margin:0; font-weight:500; font-size:clamp(20px,2.6vw,30px);
    letter-spacing:.52em; color:#f1ecdc;
    text-shadow:0 0 22px rgba(233,212,163,.25);
  }
  .brand .lat{
    margin:.9em 0 0; font-family:var(--mono); font-size:8.5px; letter-spacing:.42em;
    color:var(--dim); text-transform:uppercase;
  }
  .brand .rule{ width:118px; height:1px; background:linear-gradient(90deg,var(--gold),transparent); margin-top:12px; opacity:.55; }

  /* 右縁の縦書きの銘 */
  .motto{
    position:fixed; right:max(26px, env(safe-area-inset-right)); top:50%;
    transform:translateY(-50%); z-index:2; pointer-events:none;
    writing-mode:vertical-rl; font-size:10.5px; letter-spacing:.62em; color:rgba(155,165,195,.5);
  }

  .tools{
    position:fixed; right:max(24px, env(safe-area-inset-right));
    top:max(22px, env(safe-area-inset-top));
    display:flex; gap:8px; z-index:4;
  }
  .tools button{
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(205,216,240,.22); background:rgba(8,10,16,.35);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    color:var(--gold); font-size:13px; font-family:var(--serif); cursor:pointer;
    opacity:.55; transition:.25s;
  }
  .tools button:hover{ opacity:1; border-color:rgba(233,212,163,.55); }
  .tools button.on{ opacity:1; background:rgba(233,212,163,.16); border-color:rgba(233,212,163,.7); }

  /* 観測データ（計器の読み） */
  .hud{
    position:fixed; z-index:2; pointer-events:none;
    font-family:var(--mono); font-size:8.5px; letter-spacing:.18em;
    color:rgba(150,162,195,.62); line-height:2.1; white-space:pre;
  }
  .hud-bl{ left:max(30px, env(safe-area-inset-left)); bottom:250px; }
  .hud-br{ right:max(30px, env(safe-area-inset-right)); bottom:250px; text-align:right; }
  .hud b{ color:rgba(233,212,163,.8); font-weight:400; }

  /* 標本調書：点灯中の標本を巡回表示（香気成分・ノート・純正律の音程） */
  .dossier{
    position:fixed; left:max(30px, env(safe-area-inset-left)); top:142px; z-index:2;
    font-family:var(--mono); font-size:8.5px; letter-spacing:.14em;
    color:rgba(150,162,195,.66); line-height:2.05; white-space:pre;
    pointer-events:none; border-left:1px solid var(--hair); padding-left:12px;
  }
  .dossier b{ color:rgba(233,212,163,.85); font-weight:400; }
  .dossier svg.mol{ display:block; margin:10px 0 2px; opacity:.92; } /* 分子の線画（標本の代表成分） */

  /* 成分索引：点灯中の全香気成分の集計。共有成分（×2以上）は金で結ばれる */
  .cindex{
    position:fixed; right:max(30px, env(safe-area-inset-right)); top:142px; z-index:3;
    font-family:var(--mono); font-size:8.5px; letter-spacing:.14em;
    color:rgba(150,162,195,.66); line-height:2.05; white-space:pre; text-align:right;
    pointer-events:auto; border-right:1px solid var(--hair); padding-right:12px;
  }
  .cindex b{ color:rgba(233,212,163,.85); font-weight:400; }
  .cindex .cc{ cursor:pointer; transition:color .2s; } /* 成分名に触れると逆引き */
  .cindex .cc:hover{ color:#e9dfc2; }
  .spec.trace{ animation:traceFlash .55s ease 4; } /* 逆引きで該当標本の札が明滅 */
  @keyframes traceFlash{
    0%,100%{ box-shadow:none; }
    50%{ border-color:var(--c); box-shadow:0 0 14px var(--c); }
  }

  /* 調合台：処方箋と標本札をひとつに積む（どの画面幅でも重ならない） */
  .bench{
    position:fixed; left:50%; bottom:max(14px, env(safe-area-inset-bottom));
    transform:translateX(-50%); z-index:4;
    display:flex; flex-direction:column; align-items:center; gap:9px;
    width:min(1380px,97.5vw);
  }
  /* 処方箋：古典〜現代のジン様式をワンタップで再現する調合の譜 */
  .formulary{ display:flex; align-items:center; gap:6px; }
  .formulary .fl{
    font-family:var(--mono); font-size:7.5px; letter-spacing:.3em;
    color:rgba(150,162,195,.5); margin-right:4px; white-space:nowrap;
    min-width:84px; text-align:right; /* FORMULARY と ARCHIVE の段を揃える */
  }
  .formula{
    font-family:var(--mono); font-size:8px; letter-spacing:.16em;
    color:rgba(190,200,225,.7); background:rgba(7,9,15,.5);
    border:1px solid var(--hair); padding:5px 11px; cursor:pointer; transition:.25s;
    text-transform:uppercase; white-space:nowrap;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .formula:hover{ border-color:rgba(233,212,163,.5); color:#e9dfc2; }
  .formula.on{ border-color:rgba(233,212,163,.75); color:var(--gold); background:rgba(233,212,163,.08); }

  /* 観測記録：流れるライブログ */
  .log{
    position:fixed; left:max(30px, env(safe-area-inset-left)); bottom:332px; z-index:2;
    font-family:var(--mono); font-size:8px; letter-spacing:.12em;
    color:rgba(150,162,195,.42); line-height:2.05; white-space:pre; pointer-events:none;
  }

  .hint{
    position:fixed; left:50%; bottom:264px; transform:translateX(-50%);
    z-index:2; margin:0; pointer-events:none; text-align:center;
    font-size:11px; letter-spacing:.34em; color:#aab4d2;
    animation:hb 5.5s ease-in-out infinite; transition:opacity 1.4s;
  }
  @keyframes hb{ 0%,100%{opacity:.85} 50%{opacity:.4} }
  .hint.off{ animation:none; opacity:0; }

  /* 標本札：ラテン学名の付いた研究所のタグ。押すと層が灯る（複数同時可） */
  .specimens{
    display:flex; flex-wrap:wrap; justify-content:center; gap:5px; width:100%;
  }
  .spec{
    position:relative; padding:7px 10px 6px 13px;
    background:rgba(7,9,15,.55); border:1px solid var(--hair);
    cursor:pointer; text-align:left; transition:.3s;
    display:flex; flex-direction:column; gap:2.5px;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  .spec::before{ /* 左縁の色標 */
    content:""; position:absolute; left:-1px; top:-1px; bottom:-1px; width:2px;
    background:var(--c); opacity:.3; transition:.3s;
  }
  .spec .no{ font-family:var(--mono); font-size:7.5px; letter-spacing:.3em; color:rgba(150,162,195,.55); }
  .spec .latin{
    font-family:var(--mono); font-size:7px; letter-spacing:.07em;
    color:rgba(190,200,225,.75); text-transform:uppercase; white-space:nowrap;
  }
  .spec .jp{ font-family:var(--sans); font-size:10.5px; letter-spacing:.1em; color:var(--dim); transition:.3s; white-space:nowrap; }
  .spec .hz{ font-family:var(--mono); font-size:6.5px; letter-spacing:.1em; color:rgba(150,162,195,.45); white-space:nowrap; }
  .spec .lamp{
    position:absolute; right:9px; top:9px; width:5px; height:5px; border-radius:50%;
    background:rgba(120,130,160,.3); transition:.35s;
  }
  .spec:hover{ border-color:rgba(205,216,240,.34); }
  .spec.on{ border-color:var(--c); background:rgba(10,13,22,.78); }
  .spec.on::before{ opacity:1; box-shadow:0 0 10px var(--c); }
  .spec.on .jp{ color:#eef2fc; }
  .spec.on .lamp{ background:var(--c); box-shadow:0 0 8px var(--c); animation:lampPulse 2.6s ease-in-out infinite; }
  @keyframes lampPulse{ 0%,100%{opacity:1} 50%{opacity:.45} }

  @media (max-width:760px){
    .brand{ max-width:56vw; } /* 印が5つに増えても、銘と副題が衝突しない幅 */
    .brand h1{ font-size:13px; letter-spacing:.18em; }
    .brand .lat{ font-size:6.5px; letter-spacing:.18em; white-space:normal; line-height:1.9; }
    .tools{ gap:6px; }
    .tools button{ width:36px; height:36px; font-size:12px; }
    .motto{ display:none; }
    .hud-bl{ bottom:186px; font-size:8.5px; }
    .hud-br{ display:none; } /* 狭い画面では計器を方位のみに */
    .log{ display:none; }
    .dossier{ display:none; }
    .cindex{ /* スマホでは調書の位置（左上）に置き、逆引きも使えるように */
      left:16px; right:auto; top:118px; text-align:left;
      border-right:none; border-left:1px solid var(--hair);
      padding:0 0 0 10px; font-size:8.5px; line-height:2;
      max-height:32vh; overflow:hidden;
    }
    .hint{ bottom:228px; font-size:10.5px; letter-spacing:.22em; width:92vw; }
    .bench{ width:100vw; gap:7px; }
    .formulary{ /* 処方箋・銘酒も横にすべる棚に */
      width:100%; overflow-x:auto; justify-content:flex-start;
      padding:0 12px; scrollbar-width:none;
    }
    .formulary::-webkit-scrollbar{ display:none; }
    .formulary .fl{ font-size:8px; min-width:70px; }
    .formula{ font-size:9px; padding:7px 12px; }
    .specimens{ /* 16標本は横にすべる一列の棚に */
      flex-wrap:nowrap; overflow-x:auto; justify-content:flex-start;
      width:100%; padding:0 12px 4px;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .specimens::-webkit-scrollbar{ display:none; }
    .spec{ min-width:142px; padding:8px 9px 7px 12px; gap:3px; }
    .spec .no{ font-size:8px; }
    .spec .latin{ font-size:7.5px; }
    .spec .jp{ font-size:12.5px; }
    .spec .hz{ font-size:7.5px; }
  }
</style>
</head>
<body>
  <div class="frame"><i class="c1"></i><i class="c2"></i><i class="c3"></i><i class="c4"></i></div>
  <canvas id="g"></canvas>

  <header class="brand">
    <h1>香 の 天 文 台</h1>
    <p class="lat">Observatorium Botanicum ─ Gin Essence × Cosmos</p>
    <div class="rule"></div>
  </header>

  <aside class="motto">宇宙と植物の、交わる場所。</aside>

  <nav class="tools">
    <button id="root" title="基準星を選ぶ ─ 観測室ごと移調する">律</button>
    <button id="auto" title="自動観測 ─ 層がひとりでに移ろう">演</button>
    <button id="mute" title="音を響かせる / 黙らせる">響</button>
    <button id="dawn" title="すべての層を消灯する">還</button>
    <button id="save" title="観測記録を保存する">影</button>
  </nav>

  <div class="hud hud-bl" id="hudL"></div>
  <div class="hud hud-br" id="hudR"></div>
  <div class="log" id="log"></div>
  <div class="dossier" id="dossier"></div>
  <div class="cindex" id="cindex"></div>

  <p class="hint" id="hint">標 本 札 に 触 れ る と 、 香 り の 軌 道 と 音 が 灯 り ま す</p>
  <div class="bench">
    <nav class="formulary" id="archive"><span class="fl">ARCHIVE ──</span></nav>
    <nav class="formulary" id="formulary"><span class="fl">FORMULARY ──</span></nav>
    <nav class="specimens" id="specimens"></nav>
  </div>

<script>
"use strict";
/* ============================ 0. 道具 ============================ */
function makeRng(seed){ let a=seed>>>0; return function(){ a|=0; a=(a+0x6D2B79F5)|0;
  let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t;
  return ((t^(t>>>14))>>>0)/4294967296; }; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpC(a,b,t){ return [lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t)]; }
function rgba(c,a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }
function ease(p){ return 1-Math.pow(1-p,3); }

/* ============================ 1. 標本：ジンのボタニカル10種 ============================ */
/* deep/lite＝軌道環の色（尾と白熱）。ratio×oct＝層の音程（純正律＝全層が必ず調和）。
   音色設計：sub=体に届く低い根、noise=息のような気流、bells=鈴の言葉 */
let ROOT=110; // 基準星（律）で移調する。比率はすべて据え置き＝純正律の構造は不変
/* note＝揮発度のノート分類（BASEは残香＝アフターノート）。comps＝実在の主要香気成分（配列）。
   rt/iv＝純正律の音程（根音に対する単純整数比、すべて5-リミット）。
   e/peri＝軌道の離心率と近点（楕円軌道） */
const BOTS=[
  { id:"juniper",  no:"01", latin:"Juniperus communis",   jp:"ジュニパー",
    note:"MIDDLE", comps:["α-PINENE","MYRCENE","SABINENE"],
    rt:"1/1", iv:"PERFECT UNISON",
    deep:[20,120,90],  lite:[170,255,215], ratio:1,   oct:1,
    R:255, incl:.18,  node0:0.0, period:21000, prec:.000013, e:.08, peri:1.2,
    snd:{pad:.024, bells:{octs:[2,4], every:[5200,10500], gain:.024}} },
  { id:"coriander",no:"02", latin:"Coriandrum sativum",   jp:"コリアンダー",
    note:"MIDDLE", comps:["LINALOOL","α-PINENE","CAMPHOR"],
    rt:"9/8", iv:"MAJOR SECOND",
    deep:[150,95,30],  lite:[255,225,165], ratio:9/8, oct:1,
    R:238, incl:-.42, node0:1.1, period:19000, prec:-.000016, e:.14, peri:3.4,
    snd:{pad:.02,  bells:{octs:[2,4], every:[4600,9000],  gain:.022}} },
  { id:"angelica", no:"03", latin:"Angelica archangelica",jp:"アンジェリカ",
    note:"BASE", comps:["α-PINENE","β-PHELLANDRENE","PENTADECANOLIDE"],
    rt:"1/1", iv:"PERFECT UNISON",
    deep:[55,75,180],  lite:[180,200,255], ratio:1,   oct:.5,
    R:150, incl:.62,  node0:2.4, period:34000, prec:.00001, e:.05, peri:5.1,
    snd:{pad:.032, sub:true, bells:{octs:[1,2], every:[9000,16000], gain:.02}} },
  { id:"lemon",    no:"04", latin:"Citrus limon",         jp:"レモンピール",
    note:"TOP", comps:["LIMONENE","β-PINENE","CITRAL"],
    rt:"5/3", iv:"MAJOR SIXTH",
    deep:[150,130,35], lite:[255,248,190], ratio:5/3, oct:2,
    R:330, incl:-.12, node0:3.6, period:12500, prec:.00002, e:.18, peri:.6,
    snd:{pad:.012, bells:{octs:[1,2], every:[3400,6800],  gain:.022}} },
  { id:"orange",   no:"05", latin:"Citrus aurantium",     jp:"ビターオレンジ",
    note:"TOP", comps:["LIMONENE","MYRCENE","LINALOOL"],
    rt:"3/2", iv:"PERFECT FIFTH",
    deep:[175,85,30],  lite:[255,200,145], ratio:3/2, oct:2,
    R:312, incl:.34,  node0:4.6, period:13800, prec:-.000019, e:.12, peri:2.2,
    snd:{pad:.013, bells:{octs:[1,1.5,2], every:[3800,7400], gain:.02}} },
  { id:"orris",    no:"06", latin:"Iris pallida",         jp:"オリスルート",
    note:"BASE", comps:["α-IRONE","γ-IRONE","MYRISTIC ACID"],
    rt:"5/4", iv:"MAJOR THIRD",

/* 月齢：実際の今夜の月。背景の月が満ち欠けし、満月の夜は全層の鈴がわずかに煌めきを増す */
const LUNAR=(()=>{
  const syn=29.530588853;                       // 朔望月
  const ref=Date.UTC(2000,0,6,18,14);           // 基準新月 2000-01-06 18:14 UTC
  const age=(((Date.now()-ref)/86400000)%syn+syn)%syn;
  const p=age/syn;
  const k=(1-Math.cos(p*Math.PI*2))/2;          // 照度 0=新月 1=満月
  const names=["NEW MOON","WAXING CRESCENT","FIRST QUARTER","WAXING GIBBOUS",
               "FULL MOON","WANING GIBBOUS","LAST QUARTER","WANING CRESCENT"];
  return { age, p, k, name:names[Math.round(p*8)%8], full:k>.97 };
})();

let camYaw=0, camPitch=.34, ZK=1;
let cyc=1,syc=0,cpc=1,spc=0;
function camUpdate(t){
  camYaw=t*.000062;
  camPitch=.34+.1*Math.sin(t*.000165);
  ZK=1+.025*Math.sin(t*.000087); // ごく遅い寄り引き（呼吸する画角）
  cyc=Math.cos(camYaw); syc=Math.sin(camYaw);
  cpc=Math.cos(camPitch); spc=Math.sin(camPitch);
}
function project(p){
  const xr=p.x*cyc+p.z*syc, z1=-p.x*syc+p.z*cyc;
  const yr=p.y*cpc-z1*spc,  zr=p.y*spc+z1*cpc;
  const s=F/(F-zr)*ZK;
  return { x:CW/2+xr*s*SC, y:CH*.46-yr*s*SC, s, d:clamp((zr+420)/840,0,1) };
}

function bakeBg(){
  bgC.width=CW; bgC.height=CH;
  const c=bgC.getContext("2d");
  const g=c.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,"#04050b"); g.addColorStop(.55,"#060914"); g.addColorStop(1,"#080b18");
  c.fillStyle=g; c.fillRect(0,0,CW,CH);
  const rng=makeRng(615);
  c.globalCompositeOperation="lighter";
  // 星雲の気配
  const nebs=[[.28,.36,[60,80,160],.06],[.7,.52,[110,70,160],.045],[.5,.26,[40,90,140],.045]];
  for(const [nx,ny,col,al] of nebs){
    const r=Math.max(CW,CH)*.42;
    const ng=c.createRadialGradient(CW*nx,CH*ny,0,CW*nx,CH*ny,r);
    ng.addColorStop(0,rgba(col,al)); ng.addColorStop(1,rgba(col,0));
    c.fillStyle=ng; c.beginPath(); c.arc(CW*nx,CH*ny,r,0,7); c.fill();
  }
  // 天の川
  const ax=-CW*.05, ay=CH*.9, bx=CW*1.05, by=CH*.12;
  const dxm=bx-ax, dym=by-ay, Lm=Math.hypot(dxm,dym), nx=-dym/Lm, ny=dxm/Lm;
  for(let i=0;i<8;i++){
    const tt=rng(), px=ax+dxm*tt, py=ay+dym*tt, off=(rng()-.5)*Math.min(CW,CH)*.09;
    const r=Math.min(CW,CH)*(.05+rng()*.08);
    const mg=c.createRadialGradient(px+nx*off,py+ny*off,0,px+nx*off,py+ny*off,r);
    mg.addColorStop(0,rgba([150,170,230],.04+rng()*.035)); mg.addColorStop(1,rgba([150,170,230],0));
    c.fillStyle=mg; c.beginPath(); c.arc(px+nx*off,py+ny*off,r,0,7); c.fill();
  }
  const nMW=(CW*CH/10500)|0;
  for(let i=0;i<nMW;i++){
    const tt=rng(), gauss=(rng()+rng()+rng()-1.5)/1.5;
    const off=gauss*Math.min(CW,CH)*.08;
    const x=ax+dxm*tt+nx*off, y=ay+dym*tt+ny*off;
    if(x<0||x>CW||y<0||y>CH) continue;
    c.fillStyle=`rgba(235,240,255,${.04+rng()*.16})`;
    c.beginPath(); c.arc(x,y,(rng()*.8+.2)*U,0,7); c.fill();
  }
  // 微星
  const n=(CW*CH/30000)|0;
  for(let i=0;i<n;i++){
    const x=rng()*CW, y=rng()*CH, r=(.25+rng()*1)*U, a=.05+rng()*.22;
    c.fillStyle=`rgba(235,240,255,${a})`;
    c.beginPath(); c.arc(x,y,r,0,7); c.fill();
    if(twink.length<36) twink.push({x,y,r,a,sp:.3+rng()*1.4,ph:rng()*6});
  }
  c.globalCompositeOperation="source-over";
  // 今夜の月：実際の月齢（LUNAR）で満ち欠けする
  {
    const mx=CW*.72, my=CH*.15, mr=19*U;
    const halo=c.createRadialGradient(mx,my,0,mx,my,mr*4.5);
    halo.addColorStop(0,`rgba(235,238,250,${.10+.12*LUNAR.k})`);
    halo.addColorStop(1,"rgba(235,238,250,0)");
    c.globalCompositeOperation="lighter";
    c.fillStyle=halo; c.beginPath(); c.arc(mx,my,mr*4.5,0,7); c.fill();
    c.globalCompositeOperation="source-over";
    c.fillStyle="rgba(232,236,248,.9)";
    c.beginPath(); c.arc(mx,my,mr,0,7); c.fill();
    // 影の円盤を月内にクリップしてずらし、欠けを作る
    c.save();
    c.beginPath(); c.arc(mx,my,mr,0,7); c.clip();
    const dx=2*mr*LUNAR.k*(LUNAR.p<.5?-1:1);
    c.fillStyle="rgba(7,10,20,.97)";
    c.beginPath(); c.arc(mx+dx,my-mr*.06,mr*1.04,0,7); c.fill();
    c.restore();
  }
  // 照準環（観測儀のレチクル）：中心のごく淡い同心円と十字
  const cx=CW/2, cy=CH*.46;
  c.strokeStyle="rgba(205,216,240,.05)"; c.lineWidth=1;
  for(const r of [Math.min(CW,CH)*.42]){
    c.beginPath(); c.arc(cx,cy,r,0,7); c.stroke();
    for(let i=0;i<24;i++){ // 方位目盛
      const a=i/24*Math.PI*2;
      const l=(i%6===0)?9*U:4.5*U;
      c.beginPath();
      c.moveTo(cx+Math.cos(a)*(r-l),cy+Math.sin(a)*(r-l));
      c.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); c.stroke();
    }
  }
  c.strokeStyle="rgba(205,216,240,.04)";
  c.beginPath(); c.moveTo(cx-16*U,cy); c.lineTo(cx+16*U,cy); c.stroke();
  c.beginPath(); c.moveTo(cx,cy-16*U); c.lineTo(cx,cy+16*U); c.stroke();
  // 銀粒
  const gc2=document.createElement("canvas"); gc2.width=gc2.height=140;
  const gx=gc2.getContext("2d"); const im=gx.createImageData(140,140);
  const rng2=makeRng(31337);
  for(let i=0;i<im.data.length;i+=4){ const v=(rng2()*255)|0;
    im.data[i]=im.data[i+1]=im.data[i+2]=v; im.data[i+3]=20; }
  gx.putImageData(im,0,0);
  c.globalAlpha=.3; c.fillStyle=c.createPattern(gc2,"repeat");
  c.fillRect(0,0,CW,CH); c.globalAlpha=1;
  // ビネット
  const vg=c.createRadialGradient(CW/2,CH*.45,Math.min(CW,CH)*.3,CW/2,CH*.5,Math.max(CW,CH)*.8);
  vg.addColorStop(0,"rgba(0,0,0,0)"); vg.addColorStop(1,"rgba(0,0,0,.55)");
  c.fillStyle=vg; c.fillRect(0,0,CW,CH);
}

/* 彗星：観測中、ごくまれに視野を横切る訪問者（観測記録に残る） */
let comet=null, nextCometAt=30000;
function updateComet(t){
  if(!comet && Object.keys(rings).length && t>nextCometAt){
    const a=Math.random()*Math.PI*2, b2=(Math.random()-.5)*1.6;
    const p0={x:Math.cos(a)*Math.cos(b2)*620, y:Math.sin(b2)*620, z:Math.sin(a)*Math.cos(b2)*620};
    const p1={x:-p0.x+(Math.random()-.5)*220, y:-p0.y+(Math.random()-.5)*220, z:-p0.z+(Math.random()-.5)*220};
    const c={x:(Math.random()-.5)*130, y:(Math.random()-.5)*130, z:(Math.random()-.5)*130};
    comet={p0,p1,c,born:t,dur:6500,trail:[]};
    cometSound(p0,p1,6.5); // 航跡が見える間、音も滑降する
    addLog("TRANSIENT ─ COMET CROSSING");
  }
  if(comet){
    const k=(t-comet.born)/comet.dur;
    if(k>=1){ comet=null; nextCometAt=t+40000+Math.random()*50000; return; }
    const u=1-k; // 核の近くを掠める二次ベジェの航跡
    const p={ x:u*u*comet.p0.x+2*u*k*comet.c.x+k*k*comet.p1.x,
              y:u*u*comet.p0.y+2*u*k*comet.c.y+k*k*comet.p1.y,
              z:u*u*comet.p0.z+2*u*k*comet.c.z+k*k*comet.p1.z };
    comet.trail.push(p);
    if(comet.trail.length>16) comet.trail.shift();
  }
}
function drawComet(){
  if(!comet||comet.trail.length<2) return;
  const tr=comet.trail;
  ctx.globalCompositeOperation="lighter";
  for(let i=1;i<tr.length;i++){
    const q1=project(tr[i-1]), q2=project(tr[i]);
    ctx.strokeStyle=rgba([200,220,255],.5*i/tr.length);
    ctx.lineWidth=Math.max(.4,1.1*U*q2.s*i/tr.length);
    ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(q2.x,q2.y); ctx.stroke();
  }
  const h=project(tr[tr.length-1]);
  ctx.fillStyle="rgba(255,255,255,.85)";
  ctx.beginPath(); ctx.arc(h.x,h.y,1.6*U*h.s,0,7); ctx.fill();
  ctx.globalCompositeOperation="source-over";
}
function ringBasis(bot,t){
  const node=bot.node0+t*bot.prec; // ゆっくりとした歳差（rad/ms）
  const incl=bot.incl+.07*Math.sin(t*.000021+bot.node0*3); // 章動：傾き自体がゆっくり揺れる
  const ci=Math.cos(incl), si=Math.sin(incl);
  const cn=Math.cos(node), sn=Math.sin(node);
  return {
    e1:{x:cn, y:0, z:sn},
    e2:{x:-sn*ci, y:si, z:cn*ci},
  };
}
function ringPoint(bot,B,a,r){
  const re=r*(1-(bot.e||0)*Math.cos(a-(bot.peri||0))); // 楕円軌道（近点で締まり、遠点で膨らむ）
  return { x:(B.e1.x*Math.cos(a)+B.e2.x*Math.sin(a))*re,
           y:(B.e1.y*Math.cos(a)+B.e2.y*Math.sin(a))*re,
           z:(B.e1.z*Math.cos(a)+B.e2.z*Math.sin(a))*re };
}
function activateRing(bot){
  if(rings[bot.id]){ rings[bot.id].dir=1; return; }
  const rng=makeRng((Math.random()*1e9)>>>0);
  const N=Math.min(innerWidth,innerHeight)<700?26:38;
  const parts=[];
  for(let i=0;i<N;i++) parts.push({ off:i/N*Math.PI*2+(rng()-.5)*.1,
    wob:rng()*6, sz:.7+rng()*.9, br:rng() });
  rings[bot.id]={bot, k:0, dir:1, parts};
}
function deactivateRing(bot){ if(rings[bot.id]) rings[bot.id].dir=-1; }

/* 三次元の円環をへ8弧に分けて描く（奥行きで濃淡・sweep=出現の弧） */
function strokeCircle3D(e1,e2,R,col,baseAlpha,lw,sweep){
  const SEG=8, PTS=8;
  const A=(sweep===undefined?1:sweep)*Math.PI*2;
  for(let sgi=0;sgi<SEG;sgi++){
    const a0=sgi/SEG*Math.PI*2;
    if(a0>=A) break;
    const a1=Math.min((sgi+1)/SEG*Math.PI*2, A);
    let mid=null;
    ctx.beginPath();
    for(let i=0;i<=PTS;i++){
      const a=a0+(a1-a0)*i/PTS;
      const q=project({x:(e1.x*Math.cos(a)+e2.x*Math.sin(a))*R,
                       y:(e1.y*Math.cos(a)+e2.y*Math.sin(a))*R,
                       z:(e1.z*Math.cos(a)+e2.z*Math.sin(a))*R});
      if(i===0) ctx.moveTo(q.x,q.y); else ctx.lineTo(q.x,q.y);
      if(i===(PTS>>1)) mid=q;
    }
    const shade=.3+.7*mid.d;
    ctx.strokeStyle=rgba(lerpC(FOG,col,.5+.5*mid.d),baseAlpha*shade);
    ctx.lineWidth=Math.max(.4,lw*mid.s);
    ctx.stroke();
  }
}
function rotY(v,c,s){ return {x:v.x*c+v.z*s, y:v.y, z:-v.x*s+v.z*c}; }

function drawCage(t){
  const w=t*.0000042, c=Math.cos(w), s=Math.sin(w);
  const RC=358;
  const X=rotY({x:1,y:0,z:0},c,s), Z=rotY({x:0,y:0,z:1},c,s), Y={x:0,y:1,z:0};
  strokeCircle3D(X,Z,RC,[150,165,205],.09,.8*U);
  strokeCircle3D(X,Y,RC,[150,165,205],.055,.7*U);
  strokeCircle3D(Z,Y,RC,[150,165,205],.055,.7*U);
  const p1=project({x:0,y:RC*1.12,z:0}), p2=project({x:0,y:-RC*1.12,z:0});
  ctx.strokeStyle="rgba(205,216,240,.1)"; ctx.lineWidth=.7*U;
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  for(const p of [p1,p2]){ // 軸端の飾り珠
    ctx.fillStyle="rgba(233,212,163,.4)";
    ctx.beginPath(); ctx.arc(p.x,p.y,1.6*U*p.s,0,7); ctx.fill();
  }
}
function drawObservatory(t){
  ctx.globalCompositeOperation="lighter";
  const activeN=Object.values(rings).filter(r=>r.dir>0).length;
  drawCage(t);
  // 蒸留核：鈴が鳴るたび、微かに明滅する
  {
    const q=project({x:0,y:0,z:0});
    const breath=1+.05*Math.sin(t*.00074);
    const flick=Math.max(0,.16*Math.exp(-(t-lastBellT)/260));
    const size=(170+36*Math.min(5,activeN))*SC*q.s*breath;
    ctx.globalAlpha=clamp(.3+.1*Math.min(4,activeN)+flick,0,1);
    ctx.drawImage(coreC,q.x-size/2,q.y-size/2,size,size);
    ctx.globalAlpha=1;
    // 蒸留冠：層が三つ以上灯ると、核のまわりに逆回りの光弧が立ちのぼる
    if(activeN>=3){
      for(let i=0;i<5;i++){
        const rr=(40+i*8)*SC*q.s;
        const w0=t*.00045*(i%2?1:-1)+i*1.7;
        const span=.8+.5*Math.sin(t*.0006+i*2.1);
        ctx.strokeStyle=rgba([240,222,180],.10+.03*Math.sin(t*.001+i));
        ctx.lineWidth=.9*U;
        ctx.beginPath(); ctx.arc(q.x,q.y,rr,w0,w0+span); ctx.stroke();
      }
    }
  }
  const prims=[]; // 各環の主星（合の判定に使う）
  for(const id in rings){
    const Rg=rings[id], bot=Rg.bot;
    Rg.k+=Rg.dir*(16/1300); // 約1.3秒で出入り（tick30fps基準）
    if(Rg.k<=0){ delete rings[id]; continue; }
    Rg.k=clamp(Rg.k,0,1);
    const k=ease(Rg.k);
    const sweep=k; // 出現はコンパスが円を描くように、弧が伸びてゆく
    const B=ringBasis(bot,t);
    const r=bot.R;
    // 三重の環体：主帯・外の細い副帯・内の点線環
    strokeCircle3D(B.e1,B.e2,r,bot.deep,.42*k,1.05*U,sweep);
    strokeCircle3D(B.e1,B.e2,r*1.05,bot.deep,.16*k,.55*U,sweep);
    // 逆引きの明滅：指名された成分を含む環が一斉にまたたく
    if(trace.until>t && trace.bots.includes(id)){
      const blink=.5+.5*Math.sin((t-trace.start)*.014);
      strokeCircle3D(B.e1,B.e2,r,bot.lite,.55*blink*k,1.7*U,sweep);
    }
    for(let i=0;i<60;i++){
      const a=i/60*Math.PI*2;
      if(a>sweep*Math.PI*2) break;
      const q=project(ringPoint(bot,B,a,r*.948));
      ctx.fillStyle=rgba(lerpC(FOG,bot.deep,.5+.5*q.d),.16*k*(.3+.7*q.d));
      ctx.beginPath(); ctx.arc(q.x,q.y,.55*U*q.s,0,7); ctx.fill();
    }
    // 観測儀の刻み（30度ごと）
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2;
      if(a>sweep*Math.PI*2) continue;
      const q1=project(ringPoint(bot,B,a,r*.985));
      const q2=project(ringPoint(bot,B,a,r*1.015));
      ctx.strokeStyle=rgba(bot.lite,.2*(.3+.7*q1.d)*k);
      ctx.lineWidth=.6*U;
      ctx.beginPath(); ctx.moveTo(q1.x,q1.y); ctx.lineTo(q2.x,q2.y); ctx.stroke();
    }
    // 巡る粒：香りの分子のように環を流れる（手前は前ボケ＝被写界深度）
    const phase=t/bot.period*Math.PI*2;
    for(const P of Rg.parts){
      const a=phase+P.off;
      const am=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      if(am>sweep*Math.PI*2) continue;
      const wob=1+.012*Math.sin(t*.0011+P.wob);
      const q=project(ringPoint(bot,B,a,r*wob));
      const dk=.3+.7*q.d;
      // 密度波：環を伝う明るさのうねり（土星の環のように粒が群れて流れる）
      const wave=.72+.28*Math.sin(a*3 - t/bot.period*12.57 + bot.node0);
      const tw=(.6+.4*Math.sin(t*.002+P.wob*2))*wave;
      ctx.fillStyle=rgba(lerpC(FOG,bot.lite,.5+.5*q.d),(.32+.38*P.br)*dk*k*tw);
      ctx.beginPath(); ctx.arc(q.x,q.y,P.sz*1.4*U*q.s,0,7); ctx.fill();
      if(q.d>.9){
        ctx.fillStyle=rgba(bot.lite,.06*k);
        ctx.beginPath(); ctx.arc(q.x,q.y,P.sz*4.2*U*q.s,0,7); ctx.fill();
      }
      if(P.br>.82){ // 明るい粒には白の芯
        ctx.fillStyle=rgba([255,255,255],.5*dk*k*tw);
        ctx.beginPath(); ctx.arc(q.x,q.y,.55*U*q.s,0,7); ctx.fill();
      }
    }
    // 主星：環を巡る一等星と、その尾
    const ap=phase+bot.node0;
    const apm=((ap%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    if(apm<=sweep*Math.PI*2){
      const pos=ringPoint(bot,B,ap,r);
      const q=project(pos);
      ctx.strokeStyle=rgba(bot.lite,.4*k*(.3+.7*q.d));
      ctx.lineWidth=1.3*U*q.s; ctx.lineCap="round";
      ctx.beginPath();
      for(let i=0;i<=6;i++){
        const aa=ap-.5*(1-i/6);
        const qq=project(ringPoint(bot,B,aa,r));
        if(i===0) ctx.moveTo(qq.x,qq.y); else ctx.lineTo(qq.x,qq.y);
      }
      ctx.stroke();
      ctx.fillStyle=rgba(bot.lite,.5*k);
      ctx.beginPath(); ctx.arc(q.x,q.y,3.2*U*q.s,0,7); ctx.fill();
      ctx.fillStyle=rgba([255,255,255],.9*k);
      ctx.beginPath(); ctx.arc(q.x,q.y,1.3*U*q.s,0,7); ctx.fill();
      if(Rg.k>.8) prims.push({bot,pos});
    }
  }
  // 香気の星座：香気成分を共有する標本の主星同士が、銀のヘアラインで結ばれる。
  // 配合を変えるたび、夜空には違う星図が浮かぶ。逆引き（TRACE）中は
  // 指名された成分の糸だけが金に灯り、香りの系譜が浮かび上がる
  for(let i=0;i<prims.length;i++)for(let j=i+1;j<prims.length;j++){
    const sh=sharedOf(prims[i].bot,prims[j].bot);
    if(!sh) continue;
    const qa=project(prims[i].pos), qb=project(prims[j].pos);
    const depth=.3+.7*Math.min(qa.d,qb.d);
    const shimmer=.75+.25*Math.sin(t*.0006+i*2.1+j*3.7);
    let al=(.05+.045*Math.min(3,sh.length))*depth*shimmer;
    let col=[185,196,225], lw=.55;
    if(trace.until>t && sh.includes(trace.comp)){
      const blink=.5+.5*Math.sin((t-trace.start)*.014);
      al=.5*blink*depth; col=[233,212,163]; lw=1.0;
    }
    ctx.strokeStyle=rgba(col,al);
    ctx.lineWidth=lw*U;
    ctx.beginPath(); ctx.moveTo(qa.x,qa.y); ctx.lineTo(qb.x,qb.y); ctx.stroke();
    // 糸の中点の、ごく小さな結び目
    ctx.fillStyle=rgba(col,Math.min(1,al*1.5));
    ctx.beginPath(); ctx.arc((qa.x+qb.x)/2,(qa.y+qb.y)/2,.7*U,0,7); ctx.fill();
  }
  // 合：二つの主星が天球上で出会うとき、金の糸が結ばれ、二香の和音が鳴る
  for(let i=0;i<prims.length;i++)for(let j=i+1;j<prims.length;j++){
    const Pa=prims[i], Pb=prims[j];
    const la=Math.hypot(Pa.pos.x,Pa.pos.y,Pa.pos.z), lb=Math.hypot(Pb.pos.x,Pb.pos.y,Pb.pos.z);
    const dot=(Pa.pos.x*Pb.pos.x+Pa.pos.y*Pb.pos.y+Pa.pos.z*Pb.pos.z)/(la*lb||1);
    if(dot>Math.cos(.14)){
      const key=Pa.bot.id+"|"+Pb.bot.id;
      if(!(conjCool[key]>t)){
        conjCool[key]=t+16000;
        conjs.push({a:Pa.bot,b:Pb.bot,born:t});
        bell(Pa.bot.freq*2,.022,Pa.bot);
        setTimeout(()=>bell(Pb.bot.freq*2,.022,Pb.bot),90);
        if(Math.random()<.5){ // ときおり、合をピアノが小さく二重奏でなぞる
          pianoNote(fitPc(Pa.bot.freq),.4,.06);
          pianoNote(fitPc(Pb.bot.freq),.36,.34);
        }
        addLog(`CONJUNCTION SP.${Pa.bot.no} × SP.${Pb.bot.no}`);
      }
    }
  }
  for(let i=conjs.length-1;i>=0;i--){
    const Cj=conjs[i];
    const age=t-Cj.born;
    if(age>2200 || !rings[Cj.a.id] || !rings[Cj.b.id]){ conjs.splice(i,1); continue; }
    const kk=1-age/2200;
    const Ba=ringBasis(Cj.a,t), Bb=ringBasis(Cj.b,t);
    const qa=project(ringPoint(Cj.a,Ba,t/Cj.a.period*Math.PI*2+Cj.a.node0,Cj.a.R));
    const qb=project(ringPoint(Cj.b,Bb,t/Cj.b.period*Math.PI*2+Cj.b.node0,Cj.b.R));
    ctx.strokeStyle=rgba([233,212,163],.5*kk);
    ctx.lineWidth=.8*U;
    ctx.beginPath(); ctx.moveTo(qa.x,qa.y); ctx.lineTo(qb.x,qb.y); ctx.stroke();
    ctx.fillStyle=rgba([255,248,225],.6*kk);
    ctx.beginPath(); ctx.arc((qa.x+qb.x)/2,(qa.y+qb.y)/2,1.6*U,0,7); ctx.fill();
  }
  // 鈴の閃光：音が鳴った座標で、軌道の星がまたたく
  for(let i=flashes.length-1;i>=0;i--){
    const Fls=flashes[i];
    const age=t-Fls.born;
    if(age>900 || !rings[Fls.bot.id]){ flashes.splice(i,1); continue; }
    const k=age/900;
    const B=ringBasis(Fls.bot,t);
    const Rg=rings[Fls.bot.id];
    const r=Fls.bot.R*(.62+.38*ease(clamp(Rg.k,0,1)));
    const a=t/Fls.bot.period*Math.PI*2+Fls.phase;
    const q=project(ringPoint(Fls.bot,B,a,r));
    ctx.strokeStyle=rgba(Fls.bot.lite,(1-k)*.6);
    ctx.lineWidth=.9*U*q.s;
    ctx.beginPath(); ctx.arc(q.x,q.y,(2+14*k)*U*q.s,0,7); ctx.stroke();
    ctx.fillStyle=rgba([255,255,255],(1-k)*.9);
    ctx.beginPath(); ctx.arc(q.x,q.y,1.5*U*q.s,0,7); ctx.fill();
  }
  ctx.globalCompositeOperation="source-over";
}

/* ============================ 4. 音：層になるアンビエント ============================ */
/* 標本札ひとつ＝ひとつの層。全層が純正律の同じ根音の上に立つので、
   どの組み合わせで重ねても必ず調和し、重ねるほど壮大な和音になる */
const audio={ctx:null,master:null,echo:null,on:true,layers:{},_susT:null};
function makeNoise(ac,sec){
  const buf=ac.createBuffer(1,(ac.sampleRate*sec)|0,ac.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  return buf;
}
function makeImpulse(ac,sec){
  const len=(ac.sampleRate*sec)|0, buf=ac.createBuffer(2,len,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch); let lp=0;
    for(let i=0;i<len;i++){ const t=i/len;
      lp+=(0.5-0.42*t)*((Math.random()*2-1)-lp);
      d[i]=lp*Math.pow(1-t,2.5)*1.7; }
  }
  return buf;
}
function initAudio(){
  if(audio.ctx) return;
  const AC=window.AudioContext||window.webkitAudioContext;
  const ac=audio.ctx=new AC();
  audio.master=ac.createGain(); audio.master.gain.value=0;
  const tone=audio.tone=ac.createBiquadFilter(); tone.type="lowpass"; tone.frequency.value=1750; tone.Q.value=.35;
  const tl=ac.createOscillator(), tg=ac.createGain();
  tl.frequency.value=1/49; tg.gain.value=620;
  tl.connect(tg).connect(tone.frequency); tl.start();
  const conv=ac.createConvolver(); conv.buffer=makeImpulse(ac,4.6);
  const dry=ac.createGain(); dry.gain.value=.54;
  const wet=ac.createGain(); wet.gain.value=.52;
  const comp=ac.createDynamicsCompressor();
  comp.threshold.value=-19; comp.knee.value=26; comp.ratio.value=3.2;
  audio.master.connect(tone);
  tone.connect(dry).connect(comp);
  tone.connect(conv).connect(wet).connect(comp);
  comp.connect(ac.destination);
  const echo=audio.echo=ac.createDelay(2); echo.delayTime.value=.44;
  const fb=ac.createGain(); fb.gain.value=.33;
  const ew=ac.createGain(); ew.gain.value=.4;
  echo.connect(fb).connect(echo); echo.connect(ew).connect(audio.master);
  /* 観測室の残響＝距離感：遠い軌道の標本ほど、長い残響の彼方で鳴る。
     各層・各鈴が軌道半径に応じた量だけこの「深宇宙」バスへ送られる */
  const convFar=ac.createConvolver(); convFar.buffer=makeImpulse(ac,7.2);
  audio.farBus=ac.createGain();  audio.farBus.gain.value=1;
  audio.farGate=ac.createGain(); audio.farGate.gain.value=0; // 響/黙と連動する門
  const farWet=ac.createGain(); farWet.gain.value=.6;
  audio.farBus.connect(audio.farGate).connect(convFar);
  convFar.connect(farWet).connect(comp);
  /* 蒸留の白霧：核から立ちのぼる蒸気のノイズ・ベッド。
     層が増えるほど濃くなり、誰もいない夜は宇宙背景の囁き（2.725K）だけが残る */
  {
    const src=ac.createBufferSource(); src.buffer=makeNoise(ac,4); src.loop=true;
    const lp=ac.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2200;
    const bp=ac.createBiquadFilter(); bp.type="bandpass";
    bp.frequency.value=620; bp.Q.value=.8;
    const swp=ac.createOscillator(), swg=ac.createGain(); // 霧のフィルタが約41秒で揺らぐ
    swp.frequency.value=1/41; swg.gain.value=280;
    swp.connect(swg).connect(bp.frequency); swp.start();
    const bg=audio.bedG=ac.createGain(); bg.gain.value=0;
    src.connect(lp).connect(bp).connect(bg);
    bg.connect(audio.master);
    const fs=ac.createGain(); fs.gain.value=.4; bg.connect(fs).connect(audio.farBus);
    src.start();
  }
}
/* 軌道半径→音の奥行き（R150=核の間近 0 ・ R340=最遠 1） */
function farDepth(bot){ return clamp((bot.R-150)/190,0,1); }
function unlockAudio(){
  initAudio();
  if(audio.ctx.state==="suspended") audio.ctx.resume();
  if(audio.on){
    audio.master.gain.setTargetAtTime(.55,audio.ctx.currentTime,1.0);
    audio.farGate.gain.setTargetAtTime(.55,audio.ctx.currentTime,1.0);
  }
  if(!piano.t) piano.t=setTimeout(pianoPhrase, 8000+Math.random()*6000);
  if(!audio._bedLogged){ audio._bedLogged=true;
    addLog("BACKGROUND ─ STEAM · CMB 2.725 K"); }
}
function bell(freq,gain,bot){
  if(!audio.ctx||audio.ctx.state!=="running") return;
  lastBellT=lastT; // 蒸留核の明滅と同期
  if(LUNAR.full) gain*=1.2; // 満月の夜、鈴はわずかに煌めきを増す
  const ac=audio.ctx, now=ac.currentTime, vel=.6+Math.random()*.8;
  const g=ac.createGain();
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(gain*vel,now+.02);
  g.gain.exponentialRampToValueAtTime(.0001,now+2.8);
  let out=g;
  if(ac.createStereoPanner){
    const pan=ac.createStereoPanner();
    pan.pan.value=(Math.random()*2-1)*.8; g.connect(pan); out=pan;
  }
  out.connect(audio.master);
  if(audio.echo) out.connect(audio.echo);
  if(bot&&audio.farBus){ // 遠い軌道の鈴は、残響の彼方から届く
    const fs=ac.createGain(); fs.gain.value=farDepth(bot)*.7;
    out.connect(fs).connect(audio.farBus);
  }
  // 鈴も整数次倍音（1·2·3·5次＝純正比）を主体に。
  // ごく薄い2.76次だけが鐘の影として残る（響きを金属にする最少量）
  for(const [m,w] of [[1,1],[2,.36],[3,.18],[5,.06],[2.76,.04]]){
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.value=freq*m; o.detune.value=(Math.random()-.5)*4;
    const pg=ac.createGain(); pg.gain.value=w;
    o.connect(pg).connect(g); o.start(now); o.stop(now+3);
  }
}
/* 層を灯す：パッド（デチューン束＋五度）＋固有の彩り（sub/noise/trem）＋鈴の言葉 */
function layerOn(bot){
  unlockAudio();
  const ac=audio.ctx;
  if(audio.layers[bot.id]){ // 消灯中なら再点灯
    const L=audio.layers[bot.id];
    clearTimeout(L.stopT); L.stopT=null;
    L.g.gain.setTargetAtTime(L.level, ac.currentTime, 2.2);
    if(L.tideG) L.tideG.gain.setTargetAtTime(L.level*.22, ac.currentTime, 2.2);
    scheduleBells(bot);
    return;
  }
  const snd=bot.snd, now=ac.currentTime;
  // 距離感：遠い軌道ほど直接音をわずかに引く（残響送りは下で行う）
  const depth=farDepth(bot);
  const lv=snd.pad*(1-.22*depth);
  const g=ac.createGain(); g.gain.value=0;
  const oscs=[];
  /* 倍音列パッド：音色そのものを自然倍音（整数次 1f〜5f、約1/n減衰）で組む。
     整数次倍音は根音に対して 2/1・3/1・4/1・5/1 の単純整数比＝音色のレベルでも純正。
     第3倍音=オクターブ＋完全五度、第5倍音=2オクターブ＋純正長三度 */
  for(const det of [-4,3]){ // 基音だけ僅かにデチューンした2本（合唱のゆらぎ）
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.value=bot.freq; o.detune.value=det+(Math.random()-.5)*1.5;
    o._m=1; // 基準星の移調（律）でこの倍率のまま滑空する
    const pg=ac.createGain(); pg.gain.value=.5;
    o.connect(pg).connect(g); o.start(); oscs.push(o);
  }
  const hGains={};
  for(const [n,w] of [[2,.4],[3,.24],[4,.13],[5,.08]]){
    const o=ac.createOscillator(); o.type="sine"; o.frequency.value=bot.freq*n;
    o._m=n;
    const pg=ac.createGain(); pg.gain.value=w;
    o.connect(pg).connect(g); o.start(); oscs.push(o);
    hGains[n]=pg;
  }
  // 第2倍音（オクターブ）の艶：約37秒の周期で満ち引きし、長く聴いても表情が止まらない
  const l8=ac.createOscillator(), lg8=ac.createGain();
  l8.frequency.value=1/37; lg8.gain.value=.16;
  l8.connect(lg8).connect(hGains[2].gain); l8.start(); oscs.push(l8);
  if(snd.sub){ // 根の脈：体にじんわり届く低いオクターブ
    const os=ac.createOscillator(); os.type="sine"; os.frequency.value=bot.freq/2;
    os._m=.5;
    const gs=ac.createGain(); gs.gain.value=.5;
    os.connect(gs).connect(g); os.start(); oscs.push(os);
  }
  let bpRef=null;
  if(snd.noise){ // 気流：息のような帯域ノイズ
    const nb=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);
    const d=nb.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(); src.buffer=nb; src.loop=true;
    const bp=bpRef=ac.createBiquadFilter(); bp.type="bandpass";
    bp.frequency.value=bot.freq*6; bp.Q.value=9;
    const ng=ac.createGain(); ng.gain.value=.18;
    const nl=ac.createOscillator(), ngl=ac.createGain();
    nl.frequency.value=.07; ngl.gain.value=.1;
    nl.connect(ngl).connect(ng.gain); nl.start();
    src.connect(bp).connect(ng).connect(g);
    src.start(); oscs.push(src,nl);
  }
  const tr=snd.trem||[ .05+Math.random()*.04, .005 ];
  const lfo=ac.createOscillator(), lg=ac.createGain();
  lfo.frequency.value=tr[0]; lg.gain.value=tr[1];
  lfo.connect(lg).connect(g.gain); lfo.start(); oscs.push(lfo);
  // 潮汐：50〜90秒の大きなうねり。層が交代で前に出るので、
  // 全層が常時フル発音で擦れ続けることがなくなる（和音が呼吸する）
  const tide=ac.createOscillator(), tideG=ac.createGain();
  tide.frequency.value=1/(50+Math.random()*40);
  tide.detune.value=0;
  tideG.gain.value=lv*.22;
  tide.connect(tideG).connect(g.gain); tide.start(); oscs.push(tide);
  const pan=ac.createStereoPanner?ac.createStereoPanner():null;
  if(pan){ pan.pan.value=(Math.random()*2-1)*.7; g.connect(pan).connect(audio.master); }
  else g.connect(audio.master);
  // 深宇宙の残響へ：遠い軌道ほど多く送る
  if(audio.farBus){
    const fs=ac.createGain(); fs.gain.value=depth*.85;
    (pan||g).connect(fs); fs.connect(audio.farBus);
  }
  g.gain.setTargetAtTime(lv, now, 2.4); // じんわり満ちる
  audio.layers[bot.id]={g,oscs,bp:bpRef,h:hGains,tideG,level:lv,bellT:null,stopT:null};
  scheduleBells(bot);
}
function layerOff(bot){
  const L=audio.layers[bot.id];
  if(!L||!audio.ctx) return;
  clearTimeout(L.bellT); L.bellT=null;
  L.g.gain.setTargetAtTime(0, audio.ctx.currentTime, 1.1);
  if(L.tideG) L.tideG.gain.setTargetAtTime(0, audio.ctx.currentTime, .6); // 潮汐も鎮める
  L.stopT=setTimeout(()=>{ // 静まったら振動体ごと止めてCPUを返す
    try{ L.oscs.forEach(o=>o.stop()); }catch(e){}
    delete audio.layers[bot.id];
  },5000);
}
/* 鈴の言葉：層ごとに人間的なゆらぎの間で鳴り、映像の軌道に閃光を残す */
function scheduleBells(bot){
  const L=audio.layers[bot.id];
  if(!L) return;
  const [mn,mx]=bot.snd.bells.every;
  L.bellT=setTimeout(()=>{
    const L2=audio.layers[bot.id];
    if(!L2||L2.stopT) return;
    scheduleBells(bot);
    if(!audio.on||!audio.ctx||audio.ctx.state!=="running") return;
    const octs=bot.snd.bells.octs;
    const fq=bot.freq*octs[(Math.random()*octs.length)|0];
    bell(fq, bot.snd.bells.gain, bot);
    flashes.push({bot, phase:Math.random()*Math.PI*2, born:lastT||performance.now()});
    addLog(`SP.${bot.no} CHIME ${fq.toFixed(1)}Hz`);
  }, mn+Math.random()*(mx-mn));
}

/* ============================ 4.5 和声の天秤と観測者のピアノ ============================ */
/* 音律は攻めたまま、擦れだけを科学で手なずける。
   二音の「粗さ」を Plomp–Levelt の協和曲線（部分音同士が臨界帯域内で
   うなる量）で実測し、擦れの強い層ほど上の部分音を布で包む。
   基音の色（標本の声）はそのまま残る */
function pairRoughness(fa,fb){
  let r=0;
  const W=[1,.5,.33,.25,.2]; // 部分音の重み（約1/n）
  for(let i=1;i<=5;i++)for(let j=1;j<=5;j++){
    const f1=fa*i, f2=fb*j;
    const fmin=Math.min(f1,f2), df=Math.abs(f1-f2);
    const s=.24/(.021*fmin+19);
    r+=W[i-1]*W[j-1]*(Math.exp(-3.5*s*df)-Math.exp(-5.75*s*df));
  }
  return r;
}
/* 音程クラスの緊張：オクターブ畳み込みした音程が、半音・三全音・全音の
   どの「軋みの谷」に近いかを測る（音域に依らない、楽理側の緊張） */
function intervalTension(fa,fb){
  let r=fa/fb; if(r<1) r=1/r;
  while(r>=2) r/=2;
  const c=1200*Math.log2(r);
  const f=Math.min(c,1200-c); // 半音と長七度は同じ軋みの類
  return Math.exp(-Math.pow((f-100)/60,2))
       + .8*Math.exp(-Math.pow((f-600)/85,2))
       + .3*Math.exp(-Math.pow((f-200)/70,2));
}
let HARM={pct:0,label:"SERENE",rough:{}};
function harmLabel(p){ return p<10?"SERENE":p<33?"BALANCED":p<55?"DARING":"AUGMENTED"; }
function rebalanceHarmony(){
  const act=BOTS.filter(b=>state.active[b.id]);
  const rough={}; let rsum=0,isum=0,np=0;
  for(let i=0;i<act.length;i++)for(let j=i+1;j<act.length;j++){
    const r=pairRoughness(act[i].freq,act[j].freq);
    rough[act[i].id]=(rough[act[i].id]||0)+r;
    rough[act[j].id]=(rough[act[j].id]||0)+r;
    rsum+=r; isum+=intervalTension(act[i].freq,act[j].freq); np++;
  }
  // 緊張度＝実うなり28%＋音程クラス72%（耳の事実と楽理の事実の折衷。
  //  校正の目安：LONDON DRY 23 / BOMBAY 27 = BALANCED、半音ペア87 / 三全音62 = AUGMENTED）
  const pct=np?Math.min(100,Math.round(
    (.28*Math.min(1,(rsum/np)/.45) + .72*Math.min(1,isum/np))*100 )):0;
  HARM={pct,label:harmLabel(pct),rough};
  if(!audio.ctx) return;
  const now=audio.ctx.currentTime;
  // 擦れの強い層ほど、第2〜5部分音をそっと沈める（うなりは上音域に棲むため）
  const HW={2:.4,3:.24,4:.13,5:.08};
  for(const b of act){
    const L=audio.layers[b.id]; if(!L||!L.h) continue;
    const duck=clamp((rough[b.id]||0)*DUCK_SCALE,0,.55);
    for(const n in L.h) L.h[n].gain.setTargetAtTime(HW[n]*(1-duck),now,1.6);
  }
  // 層が増え、緊張が高まるほど、観測室の天井がそっと低くなる
  if(audio.tone)
    audio.tone.frequency.setTargetAtTime(
      Math.max(1280, 1750-60*Math.max(0,act.length-3)-3*pct), now, 2.5);
  // 蒸留の白霧：灯した層の数だけ蒸気が濃くなる。
  // 全消灯でも零にはせず、宇宙背景の囁き（2.725Kの名残）を床に敷く
  if(audio.bedG)
    audio.bedG.gain.setTargetAtTime(
      act.length ? .0035+.0011*Math.min(6,act.length) : .0016, now, 3);
}
const DUCK_SCALE=1.5; // 試聴で校正した係数（擦れ→部分音の沈め量）

/* 観測者のピアノ：フェルトを噛ませた小さな鍵盤が、観測室の隅に置いてある。
   弾くのはいま灯っている配合の音高だけ（すべて5-リミット純正）。
   均整のとれた配合なら、低い根から広やかな分散和音が立ちのぼり、
   攻めた配合なら、最も擦れ合う二音をあえて声に出してから根に還す */
const piano={t:null};
function fitPc(f){ while(f<196) f*=2; while(f>620) f/=2; return f; }
function pianoNote(freq,vel,delay){
  if(!audio.ctx||audio.ctx.state!=="running"||!audio.on) return;
  const ac=audio.ctx, t0=ac.currentTime+(delay||0);
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vel*.055,t0+.008);
  const T=clamp(7.5-freq/160,2.4,6.5); // 低い音ほど長く歌う
  g.gain.setTargetAtTime(0,t0+T*.55,T*.28);
  let out=g;
  if(ac.createStereoPanner){
    const pan=ac.createStereoPanner();
    pan.pan.value=(Math.random()*2-1)*.35; g.connect(pan); out=pan;
  }
  out.connect(audio.master);
  if(audio.echo){ const es=ac.createGain(); es.gain.value=.5; out.connect(es).connect(audio.echo); }
  if(audio.farBus){ const fs=ac.createGain(); fs.gain.value=.18; out.connect(fs).connect(audio.farBus); }
  // 弦は整数次部分音だけで組む（音色も純正比のまま。高い部分音ほど早く減衰）
  for(const [n,w,detc] of [[1,.58,-1.3],[1,.46,1.3],[2,.42,0],[3,.2,0],[4,.09,0],[5,.05,0],[6,.025,0]]){
    const o=ac.createOscillator(); o.type="sine";
    o.frequency.value=freq*n; o.detune.value=detc;
    const pg=ac.createGain();
    pg.gain.setValueAtTime(w,t0);
    pg.gain.exponentialRampToValueAtTime(.001, t0+T/Math.pow(n,1.25));
    o.connect(pg).connect(g); o.start(t0); o.stop(t0+T+.6);
  }
  { // フェルトの打鍵：ごく短い柔らかな胴鳴り
    const nb=ac.createBuffer(1,(ac.sampleRate*.06)|0,ac.sampleRate);
    const d=nb.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=ac.createBufferSource(); src.buffer=nb;
    const lp=ac.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=240;
    const ng=ac.createGain(); ng.gain.setValueAtTime(vel*.02,t0);
    ng.gain.exponentialRampToValueAtTime(.0001,t0+.09);
    src.connect(lp).connect(ng).connect(g); src.start(t0);
  }
}
/* 彗星の航跡音：視野を横切る6.5秒、ノイズが高みから低みへ滑降しながら
   映像のパンと同期して流れる（鈴と閃光に続く、音と映像の同期の教義） */
function cometSound(p0,p1,dur){
  if(!audio.ctx||audio.ctx.state!=="running"||!audio.on) return;
  const ac=audio.ctx, t0=ac.currentTime;
  const src=ac.createBufferSource(); src.buffer=makeNoise(ac,2); src.loop=true;
  const bp=ac.createBiquadFilter(); bp.type="bandpass"; bp.Q.value=2.2;
  bp.frequency.setValueAtTime(1900,t0);
  bp.frequency.exponentialRampToValueAtTime(170,t0+dur);
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(.007,t0+dur*.3);
  g.gain.linearRampToValueAtTime(0,t0+dur);
  let out=g;
  if(ac.createStereoPanner){
    const pan=ac.createStereoPanner();
    pan.pan.setValueAtTime(clamp(p0.x/700,-.8,.8),t0);
    pan.pan.linearRampToValueAtTime(clamp(p1.x/700,-.8,.8),t0+dur);
    g.connect(pan); out=pan;
  }
  out.connect(audio.master);
  if(audio.farBus){ const fs=ac.createGain(); fs.gain.value=.5; out.connect(fs).connect(audio.farBus); }
  src.connect(bp).connect(g);
  src.start(t0); src.stop(t0+dur+.1);
}
/* 記録の針音：観測記録が一行刻まれるたび、ペン先のような微かなクラックル */
let lastCrk=0;
function crackle(){
  if(!audio.ctx||audio.ctx.state!=="running"||!audio.on) return;
  const now=performance.now();
  if(now-lastCrk<350) return; // 記録が立て込む夜も、針は慎ましく
  lastCrk=now;
  const ac=audio.ctx, t0=ac.currentTime;
  const src=ac.createBufferSource(); src.buffer=makeNoise(ac,.03);
  const hp=ac.createBiquadFilter(); hp.type="highpass";
  hp.frequency.value=1400+Math.random()*900;
  const g=ac.createGain();
  g.gain.setValueAtTime(.003+Math.random()*.004,t0);
  g.gain.exponentialRampToValueAtTime(.0001,t0+.022);
  let out=g;
  if(ac.createStereoPanner){
    const pan=ac.createStereoPanner();
    pan.pan.value=(Math.random()*2-1)*.25; g.connect(pan); out=pan;
  }
  out.connect(audio.master); // 針音は机の上＝乾いた近接音のまま
  src.connect(hp).connect(g); src.start(t0);
}
function pianoPhrase(){
  piano.t=setTimeout(pianoPhrase, 14000+Math.random()*16000);
  const act=BOTS.filter(b=>state.active[b.id]);
  if(act.length<2||!audio.on||!audio.ctx||audio.ctx.state!=="running") return;
  if(Math.random()>.78) return; // 沈黙も演奏のうち
  let pcs=[];
  for(const b of act){
    const f=fitPc(b.freq);
    if(!pcs.some(x=>Math.abs(x/f-1)<.012)) pcs.push(f);
  }
  pcs.sort((a,b)=>a-b);
  const seq=[]; let gap;
  if(HARM.pct<55 || pcs.length<2){
    // 均整：低い根から、広やかに
    gap=.4+Math.random()*.22;
    seq.push([pcs[0]/2,.5]);
    for(const f of pcs.slice(0,5)) seq.push([f,.34+Math.random()*.2]);
    if(pcs.length>=2&&Math.random()<.5)
      seq.push([pcs[(Math.random()*Math.min(3,pcs.length))|0]*2,.26]);
  } else {
    // 攻め：最も擦れ合う二音を声に出し、根に還す
    gap=.3+Math.random()*.12;
    let bi=0,bj=1,br=-1;
    for(let i=0;i<pcs.length;i++)for(let j=i+1;j<pcs.length;j++){
      const r=pairRoughness(pcs[i],pcs[j]);
      if(r>br){ br=r; bi=i; bj=j; }
    }
    seq.push([pcs[bi],.52]);
    seq.push([pcs[bj],.5]);
    if(Math.random()<.7) seq.push([pcs[0]/2,.44]);
  }
  let d=.0;
  for(const [f,v] of seq){ pianoNote(f,v,d); d+=gap*(.85+Math.random()*.35); }
  addLog(`PIANO ─ ${HARM.label} · ${seq.length} VOICES`);
}

/* 律：基準星を選び直す。比率（純正律の構造）は据え置きのまま、
   観測室全体が新しい根音へグリッサンドで滑空する */
function setRoot(i){
  refIdx=((i%REFS.length)+REFS.length)%REFS.length;
  ROOT=110*REFS[refIdx].r;
  for(const b of BOTS){
    b.freq=ROOT*b.ratio*b.oct;
    const el=document.querySelector(`.spec[data-id="${b.id}"]`);
    if(el){
      el.querySelector(".hz").textContent=`${b.rt} ─ ${b.freq.toFixed(1)} Hz`;
      el.title=`${b.jp} — ${b.freq.toFixed(1)} Hz`;
    }
    const L=audio.layers[b.id];
    if(L&&audio.ctx){ // 鳴っている層は止めずに、新しい根へ滑らせる
      const now=audio.ctx.currentTime;
      for(const o of L.oscs) if(o._m&&o.frequency) o.frequency.setTargetAtTime(b.freq*o._m,now,.9);
      if(L.bp) L.bp.frequency.setTargetAtTime(b.freq*6,now,.9);
    }
  }
  rebalanceHarmony(); updateHud(); updateDossier();
}

  bell(ROOT*2,.045);

  this.title=`基準星を選ぶ ─ いま ${R.star}（${R.note} ${ROOT.toFixed(1)}Hz）`;

/* 成分索引：点灯中の標本に含まれる全香気成分を集計し、
   複数の標本が共有する成分（香りの糸）を金で照らす */
const cindexEl=document.getElementById("cindex");
function updateCindex(){
  const act=BOTS.filter(b=>state.active[b.id]);
  if(!act.length){ cindexEl.innerHTML=""; return; }
  const map={};
  for(const b of act) for(const c of b.comps) (map[c]=map[c]||[]).push(b.no);
  const rows=Object.entries(map)
    .sort((x,y)=> y[1].length-x[1].length || (x[0]<y[0]?-1:1));
  // 相性解析：いまの配合と最も多くの成分を共有する未点灯の標本を、研究所が次の一滴として勧める
  let best=null, bestShared=null;
  for(const b of BOTS){
    if(state.active[b.id]) continue;
    const sh=b.comps.filter(c=>map[c]);
    if(sh.length && (!best || sh.length>bestShared.length)){ best=b; bestShared=sh; }
  }
  const aff=best
    ? `\n\nAFFINITY → <b>SP.${best.no} ${best.latin.split(" ")[0].toUpperCase()}</b>\n`+
      `SHARED ${bestShared.join(" · ")}`
    : "";
  cindexEl.innerHTML=
    `<b>COMPOUND INDEX ── ${String(rows.length).padStart(2,"0")}</b>\n`+
    rows.slice(0,16).map(([c,ns])=>{
      const inner=ns.length>1
        ? `<b>${c}</b> ×${ns.length} ─ ${ns.join("·")}`
        : `${c} ─ ${ns[0]}`;
      return `<span class="cc" data-c="${c}">${inner}</span>`; // 触れると逆引き
    }).join("\n")+
    (rows.length>16?`\n… +${rows.length-16}`:"")+
    aff;
}

(function(){
  const N=16, R=2.2, b=[];
  const pt=i=>{ const a=-Math.PI/2+i/N*Math.PI*2;
    return [ +(Math.cos(a)*R).toFixed(3), +(Math.sin(a)*R).toFixed(3) ]; };
  for(let i=0;i<N;i++){ const p=pt(i), q=pt((i+1)%N); b.push([p[0],p[1],q[0],q[1],1]); }
  const c=pt(1), o2=[+(c[0]+.95).toFixed(3), +(c[1]-.45).toFixed(3)];
  b.push([c[0],c[1],o2[0],o2[1],2]);
  MOL["PENTADECANOLIDE"].b=b;
  MOL["PENTADECANOLIDE"].a=[[pt(0)[0],pt(0)[1],"O"],[o2[0],o2[1],"O"]];
})();

/* 構造式をヘアラインのSVGに起こす（二重結合は平行線、原子は金のラベル） */
function molSvg(comp){
  const M=MOL[comp];
  if(!M||!M.b) return "";
  const xs=[],ys=[];
  for(const bd of M.b){ xs.push(bd[0],bd[2]); ys.push(bd[1],bd[3]); }
  const x0=Math.min(...xs)-.55, x1=Math.max(...xs)+.55;
  const y0=Math.min(...ys)-.55, y1=Math.max(...ys)+.55;
  const sc=Math.min(164/(x1-x0), 68/(y1-y0));
  const w=((x1-x0)*sc).toFixed(0), h=((y1-y0)*sc).toFixed(0);
  const X=x=>((x-x0)*sc).toFixed(1), Y=y=>((y-y0)*sc).toFixed(1);
  const isLab=(x,y)=>(M.a||[]).some(A=>A[0]===x&&A[1]===y);
  let lines="";
  for(const [ax,ay,bx,by,o] of M.b){
    const dx=bx-ax, dy=by-ay, L=Math.hypot(dx,dy)||1;
    let pax=ax,pay=ay,pbx=bx,pby=by;
    if(isLab(ax,ay)){ pax+=dx/L*.33; pay+=dy/L*.33; } // ラベルの手前で結合を止める
    if(isLab(bx,by)){ pbx-=dx/L*.33; pby-=dy/L*.33; }
    lines+=`<line x1="${X(pax)}" y1="${Y(pay)}" x2="${X(pbx)}" y2="${Y(pby)}"/>`;
    if(o===2){
      const nx=-dy/L*.14, ny=dx/L*.14, s2=.13;
      lines+=`<line x1="${X(pax+dx/L*s2+nx)}" y1="${Y(pay+dy/L*s2+ny)}" `+
             `x2="${X(pbx-dx/L*s2+nx)}" y2="${Y(pby-dy/L*s2+ny)}"/>`;
    }
  }
  let labels="";
  for(const [x,y,s] of (M.a||[])){
    labels+=`<circle cx="${X(x)}" cy="${Y(y)}" r="${s.length>1?6.2:4.8}" fill="rgba(6,8,14,.92)"/>`+
            `<text x="${X(x)}" y="${Y(y)}" dy="2.6">${s}</text>`;
  }
  return `<svg class="mol" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`+
    `<g stroke="rgba(190,200,225,.62)" stroke-width="1" fill="none" stroke-linecap="round">${lines}</g>`+
    `<g font-family="SF Mono,Menlo,monospace" font-size="7.5" fill="rgba(233,212,163,.9)" text-anchor="middle">${labels}</g>`+
    `</svg>`;
}

  const noteTxt=b.note==="BASE"?"BASE ─ AFTERNOTE（残香）":b.note==="TOP"?"TOP（立ち香）":"MIDDLE（中盤）";
  dossierEl.innerHTML=
    `<b>SPECIMEN DOSSIER ── SP.${b.no}</b>\n`+
    `${b.latin.toUpperCase()} ─ ${b.jp}\n`+
    `NOTE      ${noteTxt}\n`+
    `COMPOUNDS ${b.comps.join(" · ")}\n`+
    `INTERVAL  ${b.rt} ─ ${b.iv}\n`+
    `FREQ      ${b.freq.toFixed(1)} Hz（${octTxt}）\n`+
    `ORBIT     R${b.R} · ${(b.period/1000).toFixed(1)}s · ∠${Math.round(Math.abs(b.incl)*180/Math.PI)}°`+
    molSvg(SIG[b.id])+
    (MOL[SIG[b.id]]?`FIG. ─ ${SIG[b.id]}（${MOL[SIG[b.id]].f}）`:"");
}
setInterval(()=>{ dossierIdx++; updateDossier(); },6000);

/* ============================ 6. 観測（メインループ） ============================ */
/* 方位テープ：上部中央、カメラの回転を読む度数目盛 */
function drawTape(t){
  if(Math.min(innerWidth,innerHeight)<700) return; // 狭い画面では省く
  const w=Math.min(CW*.44,560*U), cx=CW/2, y=30*U;
  const az=((camYaw*180/Math.PI)%360+360)%360;
  ctx.strokeStyle="rgba(205,216,240,.16)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-w/2,y); ctx.lineTo(cx+w/2,y); ctx.stroke();
  const ppd=w/60; // 視界60度ぶん
  ctx.fillStyle="rgba(150,162,195,.4)";
  ctx.font=`${8*U}px Menlo,monospace`; ctx.textAlign="center";
  for(let d=Math.ceil(az-30); d<=az+30; d++){
    if(d%2) continue;
    const x=cx+(d-az)*ppd;
    const major=d%10===0;
    ctx.strokeStyle=`rgba(205,216,240,${major?.28:.13})`;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y-(major?7:3.5)*U); ctx.stroke();
    if(d%30===0) ctx.fillText(((d%360+360)%360)+"°", x, y+12*U);
  }
  ctx.strokeStyle="rgba(233,212,163,.55)"; // 中央の指標
  ctx.beginPath(); ctx.moveTo(cx,y+2*U); ctx.lineTo(cx,y-9*U); ctx.stroke();
}
function composeFrame(t){
  camUpdate(t);
  ctx.drawImage(bgC,0,0);
  ctx.globalCompositeOperation="lighter";
  for(const s of twink){
    const a=s.a*.5*(.5+.5*Math.sin(t*.001*s.sp+s.ph));
    ctx.globalAlpha=a; ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation="source-over";
  drawObservatory(t);
  drawComet();
  drawTape(t);
}
let lastT=0, lastDraw=0;
function tick(t){
  if(tick._raf) cancelAnimationFrame(tick._raf);
  tick._raf=requestAnimationFrame(tick);
  // 省電力ガバナ：通常30fps、無灯の待機時は8fps
  const idle=Object.keys(rings).length===0 && flashes.length===0 && conjs.length===0 && !comet;
  if(t-lastDraw < (idle?125:33)-1) return;
  lastDraw=t;
  lastT=t;
  updateComet(t);
  composeFrame(t);
}
resize();
updateHud();
updateDossier();
updateCindex();
addLog(`LUNAR PHASE ─ ${LUNAR.name} ${Math.round(LUNAR.k*100)}%`);
if(LUNAR.full) addLog("FULL MOON ─ ALL BELLS BRIGHTENED");
// URLにレシピがあれば復元する（音は自動再生制限により、最初の操作で満ちる）
(function(){
  const m=/[#&]r=([a-z.]+)/.exec(location.hash);
  if(!m) return;
  let n=0;
  for(const id of m[1].split(".")) if(BOT[id]){ toggleBot(BOT[id],true,{quiet:true}); n++; }
  if(n){ addLog(`RECIPE RESTORED ─ ${String(n).padStart(2,"0")} LAYERS`); hintEl.classList.add("off"); }
})();
requestAnimationFrame(tick);
</script>
